server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: nexusops-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/nexusops}
    username: ${SPRING_DATASOURCE_USERNAME:nexusops}
    password: ${SPRING_DATASOURCE_PASSWORD:nexusops}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  ai:
    ollama:
      base-url: ${SPRING_AI_OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${APP_DEFAULT_MODEL:llama3}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${APP_JWT_SECRET:local-dev-secret-change-this-before-production-local-dev-secret}
    access-token-minutes: 30
    refresh-token-days: 14
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  ai:
    supported-models: llama3,qwen3,mistral
    default-model: ${APP_DEFAULT_MODEL:llama3}
    max-retries: 2
