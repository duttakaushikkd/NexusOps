services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: nexusops
      POSTGRES_USER: nexusops
      POSTGRES_PASSWORD: nexusops
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexusops -d nexusops"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 20s
      timeout: 10s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nexusops
      SPRING_DATASOURCE_USERNAME: nexusops
      SPRING_DATASOURCE_PASSWORD: nexusops
      SPRING_DATA_REDIS_HOST: redis
      SPRING_AI_OLLAMA_BASE_URL: http://ollama:11434
      APP_JWT_SECRET: local-dev-secret-change-this-before-production-local-dev-secret
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres-data:
  ollama-models:
